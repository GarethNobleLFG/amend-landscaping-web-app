services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD}
      POSTGRES_DB: amend_landscaping
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    image: node:20-alpine
    depends_on:
      - db
    working_dir: /app
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - .env 
    volumes:
      - ./api:/app 
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  frontend:
    image: node:20-alpine
    depends_on:
      - api
    working_dir: /app
    ports:
      - "5174:5174"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app 
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host --port 5174"

volumes:
  pg_data: